apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-color
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-color
  template:
    metadata:
      labels:
        app: web-color
    spec:
      containers:
      - name: web-color
        image: kodekloud/webapp-color
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web-color
spec:
  type: NodePort
  selector:
    app: web-color
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007
