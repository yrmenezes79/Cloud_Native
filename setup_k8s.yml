- name: Setup completo do servidor com Kubernetes
  hosts: localhost
  become: yes

  vars:
    usuario: yuri

  tasks:

    - name: Criar usuário
      user:
        name: "{{ usuario }}"
        shell: /bin/bash
        groups: sudo
        append: yes
        create_home: yes

    - name: Garantir acesso sudo sem senha
      copy:
        dest: "/etc/sudoers.d/{{ usuario }}"
        content: "{{ usuario }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: Atualizar lista de pacotes
      apt:
        update_cache: yes

    - name: Instalar pacotes necessários
      apt:
        name:
          - docker.io
          - curl
          - git
          - net-tools
        state: present

    - name: Adicionar usuário ao grupo docker
      user:
        name: "{{ usuario }}"
        groups: docker
        append: yes

    - name: Garantir que o Docker está ativo
      service:
        name: docker
        state: started
        enabled: yes

    # -------------------------
    # MINIKUBE
    # -------------------------

    - name: Baixar Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /tmp/minikube
        mode: '0755'

    - name: Instalar Minikube
      command: install /tmp/minikube /usr/local/bin/minikube
      args:
        creates: /usr/local/bin/minikube

    # -------------------------
    # KUBECTL
    # -------------------------

    - name: Obter versão estável do kubectl
      shell: curl -L -s https://dl.k8s.io/release/stable.txt
      register: kubectl_version

    - name: Baixar kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version.stdout }}/bin/linux/amd64/kubectl"
        dest: /tmp/kubectl
        mode: '0755'

    - name: Baixar checksum do kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version.stdout }}/bin/linux/amd64/kubectl.sha256"
        dest: /tmp/kubectl.sha256

    - name: Validar checksum do kubectl
      shell: |
        echo "$(cat /tmp/kubectl.sha256)  /tmp/kubectl" | sha256sum --check
      register: checksum_result
      changed_when: false
      failed_when: "'OK' not in checksum_result.stdout"

    - name: Instalar kubectl
      command: install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
      args:
        creates: /usr/local/bin/kubectl

    # -------------------------
    # INICIAR MINIKUBE
    # -------------------------

    - name: Iniciar cluster Minikube com Docker
      become_user: "{{ usuario }}"
      shell: minikube start --driver=docker
      args:
        creates: "/home/{{ usuario }}/.minikube"

    - name: Habilitar metrics-server
      become_user: "{{ usuario }}"
      shell: minikube addons enable metrics-server

    # -------------------------
    # DASHBOARD
    # -------------------------

    - name: Criar script para subir dashboard
      copy:
        dest: /home/{{ usuario }}/start_dashboard.sh
        mode: '0755'
        content: |
          #!/bin/bash
          minikube dashboard --url --port=8080 &
          kubectl proxy --address='0.0.0.0' --disable-filter=true

    - name: Ajustar dono do script
      file:
        path: /home/{{ usuario }}/start_dashboard.sh
        owner: "{{ usuario }}"
        group: "{{ usuario }}"
