services:
  web_server:
    image: nginx:alpine
    container_name: web_server
    ports:
      - "8080:80"
    networks:
      - backend_network
    depends_on:
      - db_cache
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

db_cache:
    image: redis:7-alpine
    container_name: db_cache
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

networks:
  backend_network:
    driver: bridge
  
